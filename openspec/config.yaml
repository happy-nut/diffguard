schema: spec-driven

# Project context — shown to AI when creating artifacts. Full north star: openspec/project.md
context: |
  Language: Korean (ko-KR)
  All OpenSpec artifacts (proposal.md, design.md, tasks.md, and spec deltas) MUST be written in Korean.
  Keep in English: OpenSpec structural markers (## Why, ## What Changes, ### Requirement:, #### Scenario:),
  requirement keywords (SHALL / MUST / SHOULD / WHEN / THEN), and all code identifiers, file paths,
  commands, and technical terms (API, TypeScript, Electron, diffScript, String.raw, Cmd+Shift, ...).

  monacori = 사람이 한 코드 리뷰를 AI 코딩 에이전트에게 줄 프롬프트로 바꾸는 키보드 우선 리뷰 surface.
  diff 뷰어가 아니다 — 산출물은 PR 승인이 아니라 프롬프트다 (human->agent).
  루프: diff/소스 리뷰 -> ?/> 코멘트(드래그하면 선택 코드까지 캡처) -> Cmd+Shift+?/> 합본 뷰 -> 복사 -> 에이전트에 붙여넣기.
  제1원칙: 가볍고 빠르게.
  모든 change는 두 질문을 통과해야 한다: (1) 리뷰가 더 빨라지나? (2) 프롬프트가 더 좋아지나? 둘 다 아니면 의심하라.
  빌드 함정: 뷰어 전체는 src/cli.ts diffScript(), String.raw 템플릿 — 그 안에 backtick이나 dollar-brace를
  절대 넣지 말 것(주석 포함); 수정 후 npm run build + 추출한 <script>에 node --check. Electron
  app-main/preload 변경은 watch가 아니라 mo 전체 재시작(Cmd+Q)이 필요하다.

